<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=" width=device-width, initial-scale = 1.0">
    <title> Multiple section webpage </title>
    <link rel="stylesheet" href="preorder.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
</head>


<body>
    <div class="IDD-FIGMA-PAGE-6-preorder-page">
        <div class="header">
            <span class="text1">
                AirPods Pro 3
            </span>
            <span class="text2">
                The world’s best Active Noise Cancellation.
            </span>
            <div class="background">
            </div>
        </div>

        <div class="airpods-pro-customizable">
            <div class="airpods-realistic"><img src="./idd photos/Realistic-Airpods-Transparent.png"
                    alt="airpods drawing" class="image"></div>
            <span class="Customise-your-Airpods">
                Customise your Airpods
            </span>
            <svg class="white" width="67" height="67" viewBox="0 0 67 67" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <circle cx="33.4145" cy="33.4145" r="33.4145" fill="url(#paint0_radial_514_54)" />
                <defs>
                    <radialGradient id="paint0_radial_514_54" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                        gradientTransform="translate(49.0703 4.43969) rotate(125.185) scale(79.4815)">
                        <stop stop-color="white" />
                        <stop offset="1" stop-color="#B1B1B1" />
                    </radialGradient>
                </defs>
            </svg>

            <svg class="black" width="67" height="67" viewBox="0 0 67 67" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <circle cx="33.4145" cy="33.4145" r="33.4145" fill="url(#paint0_radial_514_56)" />
                <defs>
                    <radialGradient id="paint0_radial_514_56" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                        gradientTransform="translate(49.0703 4.43969) rotate(125.185) scale(79.4815)">
                        <stop stop-color="#747474" />
                        <stop offset="1" />
                    </radialGradient>
                </defs>
            </svg>

            <svg class="pink" width="67" height="67" viewBox="0 0 67 67" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="33.4145" cy="33.4145" r="33.4145" fill="url(#paint0_radial_514_55)" />
                <defs>
                    <radialGradient id="paint0_radial_514_55" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                        gradientTransform="translate(49.0703 4.43969) rotate(125.185) scale(79.4815)">
                        <stop stop-color="#FFA5A5" />
                        <stop offset="1" stop-color="#FF6B6B" />
                    </radialGradient>
                </defs>
            </svg>

            <svg class="yellow" width="67" height="67" viewBox="0 0 67 67" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <circle cx="33.4145" cy="33.4145" r="33.4145" fill="url(#paint0_radial_514_57)" />
                <defs>
                    <radialGradient id="paint0_radial_514_57" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                        gradientTransform="translate(49.0703 4.43969) rotate(125.185) scale(79.4815)">
                        <stop stop-color="#FFEDA5" />
                        <stop offset="1" stop-color="#FFC94C" />
                    </radialGradient>
                </defs>
            </svg>

            <div class="Airpods-Dissect"><img src="./idd photos/Airpods-Dissect.png" alt="Airpods-Dissect"
                    class="image"></div>
        </div>

        <div class="rightText">
            <span class="Free-customisation">
                Free customisation
            </span>
            <span class="Preorder-AirPods-Pro-3">
                Preorder AirPods Pro 3
            </span>
            <span class="description">
                Now with the world’s best in-ear Active Noise Cancellation,
                all-new heart rate sensing, and 3 different comfortable eartips to choose from.
            </span>
            <div class="Component-3">
                <span class="customise-now">
                    customise now
                </span>
                <svg class="Rectangle-48" width="359" height="55" viewBox="0 0 359 55" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="358.667" height="54.6667" rx="27.3333" />
                </svg>
            </div>
        </div>

        <div class="Component-3">
            
        </div>
    </div>
    <script src="./colourcustomiser.js"></script>
</body>



</html>
