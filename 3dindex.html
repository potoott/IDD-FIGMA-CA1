<DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content=" width=device-width, initial-scale = 1.0">
        <title> Multiple section webpage </title>
        <link rel="stylesheet" href="3dstyles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
            rel="stylesheet">
    </head>

    <body>

        <script type="module" src="main.js"></script>
        <header>
            <div class="left">

                <div class="Home">
                    Home
                </div>
            </div>
            <div class= "right">
                <div class="About">
                    About
                </div>
                <div class="Contact">
                    Contact
                </div>
                <div class="Apple store">
                    Apple store
                </div>
            </div>
        </header>
        <main>

            <div id="container3D"></div>
        </main>

        <div class="banner">
            <div class="title">
                <h1>Airpods Pro 3</h1>
            </div>

            <div class="subtext">
                <p>The world's best noise cancellation</p>
            </div>
        </div>

        <div class="content-section">
            <h1>Section 1</h1>
            <p>Scroll down...</p>
        </div>

        <div class="content-section">
            <div id="container3D"></div>
        </div>

        <div class="content-section">
            <h1>Section 3</h1>
            <p>More content...</p>
        </div>
    </body>

    </html>
